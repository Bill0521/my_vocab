name: my_vocab
description: A personal vocabulary learning app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.0.5
  path_provider: ^2.1.1
  shared_preferences: ^2.2.1
  flutter_tts: ^3.7.0
  csv: ^5.0.2
  file_picker: ^5.3.3
  share_plus: ^7.2.2
  fl_chart: ^0.63.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cet6.csv
