name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Create Android Project Files
      run: flutter create --project-name my_vocab .

    - name: Update Android Configuration
      run: |
        # Set compileSdkVersion to 34 (Android 14)
        sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
        
        # Set minSdkVersion to 24 (Android 7.0) 
        # Note: We replaced the variable reference, AND any hardcoded number to be safe
        sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
        sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/g' android/app/build.gradle
        
        # Enable Multidex inside defaultConfig block
        # Helper: Insert 'multiDexEnabled true' after 'defaultConfig {'
        sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle
        
        # Print for debugging
        cat android/app/build.gradle

    - name: Clean & Get Dependencies
      run: |
        flutter clean
        flutter pub get
      
    - name: Build APK (Verbose)
      run: flutter build apk --release --verbose
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/*.apk
